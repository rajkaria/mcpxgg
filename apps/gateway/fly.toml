# Fly.io app for the MCPX gateway (S3-T09). DNS `mcp.mcpx.gg` → this app
# (S3-T10) is set after first deploy. Secrets are set via `fly secrets set`:
#   FACILITATOR_URL, USDSUI_COIN_TYPE, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN,
#   WALRUS_PUBLISHER_URL, WALRUS_AGGREGATOR_URL
app = "mcpxgg-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3003"
  SUI_NETWORK = "sui-testnet"

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

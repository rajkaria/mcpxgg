# Fly.io app for the sui-identity anchor server (S6-T11/T13).
# Optional secrets: SUI_RPC_URL / SUINS_INDEXER_URL (real SuiNS resolution),
# IDENTITY_PG_URL (real CallReceipt-derived reputation). Defaults are
# hermetic: deterministic offline SuiNS + zkLogin verifier + reputation.
app = "mcpxgg-sui-identity"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3014"

[http_service]
  internal_port = 3014
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
